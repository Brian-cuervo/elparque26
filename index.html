     <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElParque26 | Streaming</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">El<span>Parque26</span></div>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Temporadas</a></li>
        </ul>
    </nav>

    <header class="hero">
        <div class="hero-content">
            <h1 id="main-title">Un Show Más</h1>
            <p id="sub-title">Temporada 1</p>
        </div>
    </header>

    <section class="video-section">
        <div class="video-wrapper">
            <iframe id="video-frame" src="" frameborder="0" allowfullscreen></iframe>
            <div id="video-placeholder">
                <p>🍿 Seleccioná un capítulo para empezar</p>
            </div>
        </div>
    </section>

    <section class="characters-mini">
        <div class="char-row">
            <div class="c-item" onclick="festejoMordo()"><img src="mordecai.png"></div>
            <div class="c-item" onclick="retoHuevo()"><img src="rigby.png"></div>
            <div class="c-item" onclick="enojarBenson()"><img src="benson.png"></div>
            <div class="c-item" onclick="sabiduriaSkips()"><img src="skips.png"></div>
            <div class="c-item" onclick="regaloPapaleta()"><img src="papaleta.png"></div>
            <div class="c-item" onclick="bromaMusculoso()"><img src="musculoso.png"></div>
        </div>
    </section>

    <main class="container">
        <h3>Temporada 1</h3>
        <div class="movie-carousel">
            <div class="card-mini" onclick="cargarVideo('https://drive.google.com/file/d/15Xn178mK05xpnsr4JWP6czSApq9cCGYo/preview')">
                <div class="thumb">🍳</div>
                <h4>1. El Poder</h4>
            </div>
            <div class="card-mini" onclick="cargarVideo('TU_LINK_CAP_2_AQUI')">
                <div class="thumb">🪑</div>
                <h4>2. Acomoden sillas</h4>
            </div>
            </div>
    </main>

    <script>
        function cargarVideo(url) {
            if(!url || url.includes('TU_LINK')) { alert("Próximamente..."); return; }
            const frame = document.getElementById('video-frame');
            const placeholder = document.getElementById('video-placeholder');
            frame.src = url;
            frame.style.display = "block";
            placeholder.style.display = "none";
        }

        // --- EFECTOS DE LOS PERSONAJES ---

        function enojarBenson() {
            const t = document.getElementById('main-title');
            document.body.style.backgroundColor = "#ff4757";
            t.innerText = "¡VUELVAN A TRABAJAR!";
            setTimeout(() => { document.body.style.backgroundColor = "#0a0b10"; t.innerText = "Un Show Más"; }, 2000);
        }

        function retoHuevo() {
            const t = document.getElementById('main-title');
            t.innerText = "¡SÉ EL HUEVO-EXTRAORDINARIO!";
            document.body.style.backgroundColor = "#ffd32a";
            const g = document.createElement("img");
            g.src = "gorra.png";
            g.className = "efecto-pop";
            document.body.appendChild(g);
            setTimeout(() => { document.body.style.backgroundColor = "#0a0b10"; t.innerText = "Un Show Más"; g.remove(); }, 3000);
        }

        function festejoMordo() {
            const t = document.getElementById('main-title');
            t.innerText = "¡OOOOOOOOOOH!";
            document.body.style.backgroundColor = "#1e90ff";
            setTimeout(() => { document.body.style.backgroundColor = "#0a0b10"; t.innerText = "Un Show Más"; }, 1500);
        }

        function sabiduriaSkips() {
            const t = document.getElementById('main-title');
            t.innerText = "YA HE VISTO ESTO ANTES...";
            document.body.style.filter = "grayscale(1)";
            setTimeout(() => { document.body.style.filter = "none"; t.innerText = "Un Show Más"; }, 2500);
        }

        function regaloPapaleta() {
            const t = document.getElementById('main-title');
            t.innerText = "¡QUÉ BUEN SHOW!";
            document.body.style.backgroundColor = "#ff79ff";
            for(let i=0; i<20; i++) {
                const p = document.createElement("img");
                p.src = "paleta.png";
                const size = Math.random() * (60 - 30) + 30;
                p.style = `position:fixed; left:${Math.random()*100}%; top:-100px; width:${size}px; z-index:9999; transition:3s linear;`;
                document.body.appendChild(p);
                setTimeout(() => { p.style.top = "110vh"; p.style.transform = "rotate(720deg)"; }, 100);
                setTimeout(() => { p.remove(); }, 3100);
            }
            setTimeout(() => { document.body.style.backgroundColor = "#0a0b10"; t.innerText = "Un Show Más"; }, 3000);
        }

        function bromaMusculoso() {
            const t = document.getElementById('main-title');
            t.innerText = "¿SABEN QUIÉN MÁS?";
            document.body.classList.add("shake-effect");
            setTimeout(() => { t.innerText = "¡MI MAMI!"; document.body.classList.remove("shake-effect"); }, 1500);
            setTimeout(() => { t.innerText = "Un Show Más"; }, 3500);
        }
    </script>
</body>
</html>
