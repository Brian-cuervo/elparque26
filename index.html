<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EL PARQUE - Un Show Más</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="main-title">EL PARQUE</h1>

    <div class="iconos-container">
        <div class="personaje" onclick="mordecai()">
            <img src="https://i.postimg.cc/85w1Xq1q/mordecai.png" alt="Mordecai">
            <p>Mordecai</p>
        </div>
        <div class="personaje" onclick="rigby()">
            <img src="https://i.postimg.cc/k47vH6yL/rigby.png" alt="Rigby">
            <p>Rigby</p>
        </div>
        <div class="personaje" onclick="benson()">
            <img src="https://i.postimg.cc/3w6H1f9F/benson.png" alt="Benson">
            <p>Benson</p>
        </div>
        <div class="personaje" onclick="sabiduriaSkips()">
            <img src="https://i.postimg.cc/mD8mK0S7/skips-face.png" alt="Skips">
            <p>Skips</p>
        </div>
        <div class="personaje" onclick="lloverPaletas()">
            <img src="https://i.postimg.cc/50tFh404/papaleta.png" alt="Papaleta">
            <p>Papaleta</p>
        </div>
        <div class="personaje" onclick="musculoso()">
            <img src="https://i.postimg.cc/mrl1pT9C/musculoso.png" alt="Musculoso">
            <p>Musculoso</p>
        </div>
    </div>

    <a href="URL_DE_TU_FORMULARIO" target="_blank">
        <button class="btn-reportes">FORMS (REPORTES Y MÁS)</button>
    </a>

    <div class="reproductor-container">
        <iframe id="reproductor" src="https://drive.google.com/file/d/ID_VIDEO_DRIVE/preview" allow="autoplay" allowfullscreen></iframe>
    </div>

    <div class="contenedor-libro">
        <div id="mi-libro" class="libro" onclick="abrirCerrarLibro()">
            <div class="tapa back-cover">
                <h3 style="font-family: 'Arial', sans-serif; color: #8b0000; border-bottom: 2px solid #8b0000; margin-top: 20px;">LA WIKI DEL PARQUE</h3>
                <p style="font-size: 0.9rem; margin: 15px; line-height: 1.4; color: #222;">Acá vamos a cargar toda la info de los episodios, objetos mágicos y secretos de Un Show Más.</p>
                <p style="font-size: 0.8rem; color: #777;">(¡Próximamente...!)</p>
            </div>
            <div class="tapa front-cover">
                <h2 style="font-family: 'Luckiest Guy', cursive; font-size: 1.8rem; line-height: 1.1; margin: 0; letter-spacing: 1px;">EL LIBRO</h2>
                <p style="font-family: 'Arial', sans-serif; font-size: 0.8rem; margin: 2px 0; font-weight: bold; color: #ffeb3b;">DE LOS</p>
                <h2 style="font-family: 'Luckiest Guy', cursive; font-size: 1.8rem; margin: 0; letter-spacing: 1px;">RÉCORDS</h2>
                <div style="width: 60px; height: 5px; background: #d4af37; margin-top: 25px; border-radius: 2px;"></div>
                <p style="font-size: 0.7rem; margin-top: 40px; opacity: 0.7;">Toca para abrir</p>
            </div>
        </div>
    </div>

    <h3 style="margin-top: 40px;">CAPÍTULOS</h3>
    <div class="capitulos-container">
        <button class="btn" onclick="cambiarCapitulo('ID1_DRIVE', '1. Capítulo Uno')">1. Capítulo Uno</button>
        <button class="btn" onclick="cambiarCapitulo('ID2_DRIVE', '2. Capítulo Dos')">2. Capítulo Dos</button>
        <button class="btn" onclick="cambiarCapitulo('ID3_DRIVE', '3. Capítulo Tres')">3. Capítulo Tres</button>
    </div>

    <script>
        function cambiarCapitulo(idDrive, tituloCap) {
            const reproductor = document.getElementById('reproductor');
            reproductor.src = `https://drive.google.com/file/d/${idDrive}/preview`;
            document.getElementById('main-title').innerText = tituloCap.toUpperCase();
        }

        function mordecai() { alert("Mordecai: OOOOOHH!"); }
        function rigby() { alert("Rigby: HMPH! HMPH!"); }
        function benson() { alert("Benson: ¡ESTÁN DESPEDIDOS O LIMPIAN ESTE DESASTRE!"); }
        function musculoso() { alert("Musculoso: ¡OOOOOHHH MI MAMI!"); }

        function lloverPaletas() {
            for (let i = 0; i < 20; i++) {
                setTimeout(() => {
                    let p = document.createElement('div');
                    p.innerText = '🍭';
                    p.className = 'paleta';
                    p.style.left = Math.random() * 100 + 'vw';
                    p.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(p);
                    setTimeout(() => p.remove(), 3000);
                }, i * 100);
            }
        }

        function sabiduriaSkips() {
            const t = document.getElementById('main-title');
            const frases = [
                "YA HE VISTO ESTO ANTES...",
                "¡TÉMPANOS!",
                "MI MENTE ES UNA TRAMPA DE ACERO.",
                "YA NO PUEDO MÁS...",
                "VEO TODA LA CULPA EN TUS OJOS.",
                "MI VERDADERO NOMBRE NO ES SKIPS...",
                "¡SÉ EXTRA HUEVO ORDINARIO!",
                "NECESITAN EL COMBO DE DESTRUCCIÓN."
            ];
            const fraseSuerte = frases[Math.floor(Math.random() * frases.length)];
            
            t.innerText = fraseSuerte;
            document.body.style.filter = "grayscale(1)";
            setTimeout(() => { 
                document.body.style.filter = "none"; 
                t.innerText = "EL PARQUE"; 
            }, 3000);
        }

        function abrirCerrarLibro() {
            const libro = document.getElementById('mi-libro');
            libro.classList.toggle('libro-abierto');
        }
    </script>
</body>
</html>
